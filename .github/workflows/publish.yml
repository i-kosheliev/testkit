name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Check if version already published on npm
        id: npm_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view "$PACKAGE@$VERSION" version 2>/dev/null | grep -q "^$VERSION$"; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "::notice::$PACKAGE@$VERSION already on npm — skipping publish"
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.already_published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release (idempotent)
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "::notice::Release ${{ github.ref_name }} already exists — skipping"
          else
            gh release create "${{ github.ref_name }}" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
